version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: eventwall
      POSTGRES_USER: eventwall
      POSTGRES_PASSWORD: eventwall_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://eventwall:eventwall_password@db:5432/eventwall
      REDIS_URL: redis://redis:6379/0
      DEBUG: "False"
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
    volumes:
      - ./backend:/app
      - ${FIREBASE_CREDENTIALS_PATH}:/app/firebase-key.json
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data:
